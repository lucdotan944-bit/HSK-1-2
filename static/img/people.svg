<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <rect width="200" height="150" rx="12" fill="#F1FAEE"/>
  <!-- People SVG - Two people talking -->
  <circle cx="70" cy="55" r="18" fill="#A8DADC" stroke="#457B9D" stroke-width="2"/>
  <circle cx="130" cy="55" r="18" fill="#E63946" stroke="#C1121F" stroke-width="2"/>
  <!-- Bodies -->
  <line x1="70" y1="73" x2="55" y2="120" stroke="#457B9D" stroke-width="2.5"/>
  <line x1="70" y1="73" x2="85" y2="120" stroke="#457B9D" stroke-width="2.5"/>
  <line x1="130" y1="73" x2="115" y2="120" stroke="#C1121F" stroke-width="2.5"/>
  <line x1="130" y1="73" x2="145" y2="120" stroke="#C1121F" stroke-width="2.5"/>
  <!-- Speech bubble -->
  <path d="M85 35 Q100 20 115 35" fill="none" stroke="#E9C46A" stroke-width="1.5"/>
  <text x="90" y="32" font-size="8" fill="#E9C46A">你好</text>
  <text x="110" y="32" font-size="8" fill="#E9C46A">你好</text>
  <!-- Label -->
  <text x="100" y="140" text-anchor="middle" font-size="11" fill="#1D3557" font-weight="bold">人 / 朋友</text>
</svg>
