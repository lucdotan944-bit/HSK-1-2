<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <rect width="200" height="150" rx="12" fill="#F1FAEE"/>
  <!-- Food SVG - Bowl and chopsticks -->
  <ellipse cx="100" cy="90" rx="50" ry="30" fill="#FFF3E0" stroke="#E63946" stroke-width="2"/>
  <ellipse cx="100" cy="75" rx="45" ry="25" fill="#FFE0B2"/>
  <path d="M55 75 Q100 65 145 75" fill="none" stroke="#E63946" stroke-width="2"/>
  <!-- Steam -->
  <path d="M80 60 Q82 50 80 45" fill="none" stroke="#A8DADC" stroke-width="1.5" opacity="0.6"/>
  <path d="M95 58 Q97 48 95 40" fill="none" stroke="#A8DADC" stroke-width="1.5" opacity="0.6"/>
  <path d="M110 60 Q112 50 110 45" fill="none" stroke="#A8DADC" stroke-width="1.5" opacity="0.6"/>
  <!-- Chopsticks -->
  <line x1="130" y1="40" x2="145" y2="95" stroke="#8B4513" stroke-width="2"/>
  <line x1="140" y1="40" x2="155" y2="95" stroke="#8B4513" stroke-width="2"/>
  <!-- Label -->
  <text x="100" y="130" text-anchor="middle" font-size="11" fill="#1D3557" font-weight="bold">吃 / 喝</text>
</svg>
